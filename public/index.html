<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PPTX → JSON</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link href="./styles.css" rel="stylesheet" />

</head>





<body>
<div class="wrap">
    <header>
    <div class="eyebrow">PPTX content extraction</div>
    <h1>Slides in. <span class="arrow">JSON</span> out.</h1>
    <p class="sub">Drop a PowerPoint file and get back the text, images, and slide-canvas geometry of every shape as structured JSON.</p>
    </header>

    <div class="frame" id="frame">
    <div class="drop" id="drop" tabindex="0" role="button" aria-label="Upload a .pptx file">
        <div class="glyph">[ + ]</div>
        <div class="headline">Drop your <strong>.pptx</strong> here</div>
        <div class="hint">or <span class="browse">click to browse</span> &nbsp;·&nbsp; 
            max 25 MB</div> 
        <!-- previously 100MB -->
        
        <div class="rule"><span class="dot"></span> .pptx only</div>
    </div>
    <input type="file" id="file" accept=".pptx,application/vnd.openxmlformats-officedocument.presentationml.presentation" />
    </div>

    <div class="status" id="status" role="status" aria-live="polite"></div>

    <section class="results" id="results" aria-live="polite">
    <div class="spec" id="spec"></div>

    <div class="panel-head">
        <span class="label">Extracted JSON</span>
        <div class="actions">
        <button class="act" id="copyBtn">Copy</button>
        <button class="act" id="downloadBtn">Download</button>
        </div>
    </div>
    <pre class="json" id="output"></pre>
    <div class="trunc-note" id="truncNote" hidden></div>
    </section>

    <footer>
    </footer>
</div>




<!-- Javascript  -->
<script src="scripts.js" defer></script>

</body>
</html>
